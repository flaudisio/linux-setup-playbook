---
- name: Include Snap tasks
  ansible.builtin.import_tasks: snap.yml
  when: ansible_facts["distribution"] == "Ubuntu"
  tags: packages:snap

- name: Include APT tasks
  ansible.builtin.import_tasks: apt.yml
  when: ansible_facts["pkg_mgr"] == "apt"
  tags: packages:apt

- name: Include pipx tasks
  ansible.builtin.import_tasks: pipx.yml
  tags: packages:pipx

- name: Run post commands
  ansible.builtin.shell:
    cmd: "{{ item.cmd | default(item) }}"
    creates: "{{ item.creates | default(omit) }}"
  loop: "{{ packages_post_commands }}"
  become: "{{ item.become | default(false) }}"
  tags: packages:post-commands
